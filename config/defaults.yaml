project:
  name: mitochondrial_deletion_discovery
  output_dir: results
  work_dir: resources
  result_schema_version: 2.1-alignment-directed-arcs-mate-aware
dataset:
  read_technology: unknown
  molecule_type: unknown
  assay_type: unknown
  library_strategy: unknown
workflow:
  start_from: raw
samples:
  source: table
  required_columns:
  - sample
  - dataset
  - species
  read_input:
    accession_column: run_accession
    fastq_1_column: fastq_1
    fastq_2_column: fastq_2
downloads:
  method: fasterq_dump
  auto_order:
  - fasterq_dump
  - ena_fastq
  fasterq_threads: 2
  prefetch: false
  validate_fastq: true
  sra_settings_dir: resources/sra-settings
  sra_cache_dir: resources/sra-cache
qc:
  run_fastqc: true
  fastp_threads: 2
  trim_if_adapter_rate_above_percent: 0.5
  trim_if_q30_below_percent: 75
  minimum_length_after_trimming: 35
  fastp_extra: ''
mapping:
  first_pass_aligner: star
  first_pass_read_selection: whole_genome_mt_best
  short_read_nuclear_depletion_candidate: hisat2
  long_read_nuclear_depletion_candidate: minimap2
  first_pass_minimap2_preset: sr
  first_pass_minimap2_threads: 4
  first_pass_minimap2_extra: ''
  first_pass_minimap2_index_extra: ''
  whole_genome_min_mt_mapq: 0
  whole_genome_min_mt_aligned_fraction: 0.5
  whole_genome_ambiguous_mapq_below: 10
  whole_genome_competing_nuclear_aligned_fraction: 0.5
  keep_ambiguous_mt_nuclear_reads: true
  star_threads: 8
  star_genome_sa_index_nbases: 13
  minimum_mapq_full_genome: 20
  minimum_mapq_mt: 20
  remove_multimappers: true
  star_chimeric_options:
    outSAMunmapped: Within
    outSAMattributes: NH HI AS nM
    chimSegmentMin: 12
    chimJunctionOverhangMin: 8
    chimOutType: Junctions WithinBAM
    chimOutJunctionFormat: 1
    alignSJDBoverhangMin: 10
    alignMatesGapMax: 100000
    alignIntronMax: 100
    alignSJstitchMismatchNmax: 5 -1 5 5
    chimMultimapScoreRange: 3
    chimScoreJunctionNonGTAG: -1
    chimMultimapNmax: 20
    chimNonchimScoreDropMin: 10
    alignInsertionFlush: Right
    alignSplicedMateMapLminOverLmate: 0
    alignSplicedMateMapLmin: 30
  star_nuclear_options:
    outFilterMultimapNmax: 20
mt_realign:
  input_strategy: whole_genome_mt_best
  include_low_mapq: true
  include_multimappers: true
  include_supplementary: true
  include_secondary: true
  include_chimeric_mt_reads: true
  include_mates_of_mt_evidence_reads: false
  write_read_classification_tsv: false
  rotations:
  - name: normal
    start: 1
  - name: half
    start: half
  circular_padding: 0
  minimap2_preset: sr
  minimap2_threads: 4
  minimap2_extra: ''
  minimap2_index_extra: ''
  minimap2_min_mapq: 0
  minimap2_include_secondary: true
  minimap2_include_supplementary: true
  min_segment_aligned_fraction: 0.15
  max_soft_clip_fraction: 0.9
  max_query_overlap_bp: 10
  max_query_gap_bp: 20
  star_genome_sa_index_nbases: 7
  star_sort_ram: 8000000000
  star_chimeric_options:
    outSAMunmapped: Within
    outSAMattributes: NH HI AS nM
    chimSegmentMin: 12
    chimJunctionOverhangMin: 8
    chimOutType: Junctions WithinBAM
    chimOutJunctionFormat: 1
    alignMatesGapMax: 20000
    alignIntronMax: 100
    alignSJstitchMismatchNmax: 5 -1 5 5
    chimMultimapScoreRange: 3
    chimScoreJunctionNonGTAG: -1
    chimMultimapNmax: 20
    chimNonchimScoreDropMin: 10
    alignInsertionFlush: Right
    alignSplicedMateMapLminOverLmate: 0
    alignSplicedMateMapLmin: 30
junctions:
  arc_assignment: alignment_directed
  alignment_pairing_mode: all_compatible
  ambiguous_direction_policy: exclude
  min_anchor_length: 20
  min_deletion_size: 100
  max_deletion_size: 16000
  breakpoint_slop_bp: 10
  min_split_read_support: 2
  reference_support_window_bp: 20
  require_same_orientation: true
  exclude_expected_transcript_junctions: true
plots:
  enabled: true
  large_deletion_min_size: 1000
  rainfall_min_support_per_million: 0.0
  rainfall_max_points_per_group: 300
  endpoint_density_bin_size: 50
  endpoint_density_smooth_bins: 7
report:
  html: true
  exact_deletion_table:
    min_total_supporting_reads: 50
    always_include_configured_targets: true
    max_rows: 500
analysis:
  normalization_denominator: total_usable_reads
  pseudocount: 1.0e-09
  effect_size_pseudocount_per_million: 0.5
  min_group_size_for_tests: 2
  mt_regions: []
  known_sequence_searches: []
